version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lims_app
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  web:
    build: .
    env_file:
      - .env
    command: bash -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn appsett.wsgi:application -b 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - '8000:8000'
    environment:
      DJANGO_SECRET_KEY: 'please-change-this'
      DJANGO_DEBUG: 'False'
      POSTGRES_DB: lims_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
    depends_on:
      - db

volumes:
  db-data:
    driver: local
