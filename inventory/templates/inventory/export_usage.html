{% extends "base.html" %}

{% block title %}Export Usage{% endblock %}

{% block content %}
<h1>Export Inventory Usage</h1>
<p>Enter a start and end date (YYYY-MM-DD) and choose raw rows or aggregate.</p>
<form method="get">
  <label>Start: <input type="date" name="start" required></label>
  <label>End: <input type="date" name="end" required></label>
  <label>Action:
    <select name="action">
      <option value="aggregate">Aggregate</option>
      <option value="rows">Raw rows</option>
    </select>
  </label>
  <button type="submit" class="btn btn-primary">Download</button>
</form>
{% endblock %}
